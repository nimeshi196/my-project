<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table with Combo Box</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 40px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        select {
            padding: 8px;
            margin-bottom: 20px;
        }

        table {
            width: 70%;
            margin: auto;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ccc;
        }

        th {
            background: #333;
            color: white;
        }

        tr:hover {
            background: #f1f1f1;
        }
    </style>
</head>

<body>

<h2>Student Table</h2>

<!-- Combo Box -->
<label>Select Course: </label>
<select>
    <option value="all">All</option>
    <option value="it">IT</option>
    <option value="cs">Computer Science</option>
    <option value="se">Software Engineering</option>
</select>

<!-- Table -->
<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Course</th>
    </tr>

    <tr>
        <td>1</td>
        <td>Nimal</td>
        <td>IT</td>
    </tr>

    <tr>
        <td>2</td>
